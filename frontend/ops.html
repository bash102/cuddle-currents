<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cuddle Currents — Ops</title>
    <link rel="stylesheet" href="/theme.css" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font: 14px/1.4 system-ui, -apple-system, sans-serif;
      }
      header {
        display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
        padding: 10px 16px; background: var(--bg-2); border-bottom: 1px solid var(--border);
        position: sticky; top: 0; z-index: 5;
      }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .3px; }
      header .kv { color: var(--muted); }
      header .kv b { color: var(--text); font-weight: 600; }
      select {
        background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
        border-radius: 6px; padding: 3px 6px;
      }
      .layout { display: grid; grid-template-columns: 260px 1fr 300px; gap: 14px; padding: 14px; }
      .col h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 8px; }
      .device, .card {
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        padding: 10px 12px; margin-bottom: 10px;
      }
      .devhead { display: flex; justify-content: space-between; font-size: 12px; }
      .devid { color: var(--muted); word-break: break-all; }
      .devhr { color: var(--accent); font-variant-numeric: tabular-nums; }
      .enrollrow { display: flex; gap: 6px; margin-top: 8px; }
      .nameinput { flex: 1; min-width: 0; background: var(--field); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; }
      button { background: var(--panel-2); color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; padding: 4px 10px; cursor: pointer; }
      button:hover { background: var(--accent); color: #2a0f12; }
      .cardhead { display: flex; align-items: center; gap: 8px; }
      .reassign { font-size: 11px; padding: 2px 4px; max-width: 150px; color: var(--muted); }
      .assignsel { width: 100%; margin-top: 6px; font-size: 11px; padding: 3px 5px; color: var(--muted); }
      .glyph { flex: none; }
      .seat { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
      .name { font-weight: 600; }
      .conn { font-size: 12px; }
      .enroll { font-size: 11px; color: var(--muted); }
      .grow { flex: 1; }
      .metrics { display: flex; gap: 18px; margin: 8px 0 6px; }
      .metric label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; }
      .metric span { font-size: 18px; font-variant-numeric: tabular-nums; }
      .qualwrap { display: flex; align-items: center; gap: 8px; }
      .qualbar { flex: 1; height: 6px; background: var(--field); border-radius: 3px; overflow: hidden; }
      .qualfill { height: 100%; width: 0; transition: width .2s; }
      .qflags { font-size: 10px; color: var(--warn); min-height: 12px; }
      .tracewrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
      .trace { flex: 1; background: var(--field); border-radius: 6px; }
      .dial { background: var(--field); border-radius: 6px; flex: none; }
      .baseprog { display: none; height: 4px; background: var(--field); border-radius: 2px; margin-top: 8px; overflow: hidden; }
      .basefill { height: 100%; width: 0; background: var(--accent-2); transition: width .2s; }
      .synchead { display: flex; gap: 16px; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
      .synchead .big { font-size: 22px; font-weight: 600; }
      .synchead label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; }
      #heatmap { width: 100%; height: 280px; background: var(--field); border-radius: 10px; }
      .empty { color: var(--faint); font-size: 13px; }
      .hint { color: var(--faint); font-size: 11px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <header>
      <h1>🫧 Cuddle Currents · Ops</h1>
      <span class="kv">server <b id="serverState">…</b></span>
      <span class="kv">source <b id="sourceLabel">—</b></span>
      <span class="kv">scenario <b id="scenarioLabel">—</b></span>
      <span class="kv">sync mode
        <select id="syncMode">
          <option value="zscore">zscore</option>
          <option value="raw">raw</option>
          <option value="baseline_delta">baseline_delta</option>
        </select>
      </span>
      <span class="kv">sim scenario
        <select id="scenario">
          <option value="drift_into_sync">drift_into_sync</option>
          <option value="independent">independent</option>
          <option value="dropout">dropout</option>
          <option value="cliques">cliques</option>
          <option value="sync_then_break">sync_then_break</option>
          <option value="contagion">contagion</option>
          <option value="pacer">pacer</option>
        </select>
      </span>
    </header>

    <div class="layout">
      <div class="col">
        <h2>Unassigned devices</h2>
        <div id="unassigned"></div>
        <div id="unassignedEmpty" class="empty">No unassigned devices.</div>
        <div class="hint">Power on a band, identify it by its live HR, name it, and enroll.</div>
      </div>

      <div class="col">
        <h2>People</h2>
        <div id="people"></div>
      </div>

      <div class="col">
        <h2>Synchrony</h2>
        <div class="synchead">
          <div><label>cohesion</label><span class="big" id="cohesion">—</span></div>
          <div><label>order R</label><span class="big" id="orderparam">—</span></div>
          <div><label>mode</label><span id="modeShown">—</span></div>
        </div>
        <canvas id="heatmap" width="300" height="300"></canvas>
        <div class="hint">Warm = in-phase, blue = anti-phase. Diagonal is self.</div>
      </div>
    </div>

    <script type="module">
      import { connect } from "./js/ws.js";
      import "./js/ops/ops.js";
      connect();
    </script>
  </body>
</html>
