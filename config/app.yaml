# Cuddle Currents — runtime configuration
# All timing values in seconds unless noted.

processing:
  resample_hz: 4.0            # uniform grid for cross-person correlation
  hr_smooth_tau: 3.0          # EMA time constant for smoothed instantaneous HR
  rmssd_window: 45.0          # rolling HRV window
  sync_window: 30.0           # sliding window for pairwise correlation / PLV
  sync_max_lag: 2.0           # +/- seconds: bounded lag scan aligns the two HR
                              #   envelopes (bands stamp beats ~0.5s apart). Keep
                              #   small — a wide search inflates uncorrelated pairs.
                              #   0 disables.
  sync_mode: zscore           # raw | zscore | baseline_delta
  stale_after_rr_factor: 2.5  # mark STALE if no beat within factor * expected RR
  sync_grace: 10.0            # keep a disconnected person in sync this long, then drop

quality:
  rr_min: 0.30                # seconds (HR 200)
  rr_max: 2.00                # seconds (HR 30)
  ectopic_pct: 0.20           # |RR_n - RR_{n-1}| > pct * local median => artifact
  dropped_ratio: 1.75         # RR ~ ratio * local median => likely dropped beat
  coverage_window: 20.0

artifact:                     # beat-level spike correction feeding HRV + synchrony
  enabled: true
  rr_min: 0.30
  rr_max: 2.00
  hampel_window: 5            # beats; local median/MAD window
  hampel_sigma: 3.0           # replace beats > sigma*MAD from local median...
  min_frac: 0.20              # ...AND > this fraction of median RR (Malik floor;
                              #    prevents over-correcting flat resting signals)
  repair: true                # split ~2x (missed) / merge ~0.5x (extra) beats

baseline:
  duration: 120.0             # rest capture length (sim shortens this)
  min_quality: 0.6            # accept baseline only if mean quality >= this
  min_beats: 60               # need at least this many clean beats

transport:
  host: 127.0.0.1
  port: 8770                  # uncommon default to avoid collisions; override with --port
  frame_hz: 10.0              # StateFrame broadcast rate

reconnect:
  backoff_start: 1.0
  backoff_max: 16.0
  jitter: 0.3
  drop_after: 20.0            # report DISCONNECTED after this much silence/failure,
                             #   while the retry task keeps trying at backoff_max
  evict_after: 120.0         # purge an UNBOUND, absent device after this long
                             #   (bound devices are never evicted)
